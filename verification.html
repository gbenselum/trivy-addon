<!DOCTYPE html>
<html>
<body>
    <div id="test-output">UNRENDERED</div>
    <script>
        function escapeHTML(str) {
            if (!str) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        try {
            const unsafe = "<b id='bad'>This should not be bold</b><script>console.log('XSS')<\/script>";
            document.getElementById('test-output').innerHTML = "Escaped: " + escapeHTML(unsafe);
        } catch (e) {
            document.getElementById('test-output').textContent = "ERROR: " + e.message;
        }
    </script>
</body>
</html>
