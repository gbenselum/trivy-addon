# Project identification
sonar.projectKey=trivy-cockpit-addon
sonar.projectName=Trivy Cockpit Addon
sonar.projectVersion=3.0.0

# Source code settings
sonar.sources=.
sonar.exclusions=node_modules/**, reports/**, .git/**

# Analysis parameters
sonar.sourceEncoding=UTF-8
sonar.language=js
sonar.javascript.environments=browser
sonar.javascript.file.suffixes=.js

# Shell script analysis
sonar.shell.file.suffixes=.sh
